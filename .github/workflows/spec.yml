name: spec

on:
  push:
  pull_request:

jobs:
  python-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run project spec
        run: python -m unittest discover -s tests -v
